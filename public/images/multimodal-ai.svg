<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg)" />
  
  <!-- Central Processing Unit -->
  <circle cx="400" cy="200" r="60" fill="#0f172a" />
  <text x="400" y="208" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">AI</text>
  
  <!-- Inputs -->
  <g>
    <!-- Text -->
    <circle cx="250" cy="100" r="40" fill="#3b82f6" opacity="0.8" />
    <text x="250" y="105" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white">Text</text>
    <line x1="280" y1="120" x2="350" y2="170" stroke="#3b82f6" stroke-width="3" />
    
    <!-- Image -->
    <circle cx="250" cy="300" r="40" fill="#10b981" opacity="0.8" />
    <text x="250" y="305" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white">Image</text>
    <line x1="280" y1="280" x2="350" y2="230" stroke="#10b981" stroke-width="3" />
    
    <!-- Audio -->
    <circle cx="550" cy="100" r="40" fill="#f59e0b" opacity="0.8" />
    <text x="550" y="105" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white">Audio</text>
    <line x1="520" y1="120" x2="450" y2="170" stroke="#f59e0b" stroke-width="3" />
    
    <!-- Video -->
    <circle cx="550" cy="300" r="40" fill="#ef4444" opacity="0.8" />
    <text x="550" y="305" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white">Video</text>
    <line x1="520" y1="280" x2="450" y2="230" stroke="#ef4444" stroke-width="3" />
  </g>
  
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Multimodal AI</text>
</svg>
