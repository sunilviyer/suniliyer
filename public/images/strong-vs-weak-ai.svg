<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg)" />
  
  <!-- Weak AI Side -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="80" fill="white" stroke="#3b82f6" stroke-width="2" />
    <text x="0" y="-100" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1e3a8a">Weak AI</text>
    <text x="0" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#64748b">Task Specific</text>
    
    <!-- Gear Icon representing specific task -->
    <path d="M-30,-30 L30,-30 L30,30 L-30,30 Z" fill="none" stroke="#3b82f6" stroke-width="4" />
    <path d="M-20,0 L20,0 M0,-20 L0,20" stroke="#3b82f6" stroke-width="4" />
    <circle cx="0" cy="0" r="15" fill="#3b82f6" />
  </g>
  
  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="350" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5" />
  
  <!-- Strong AI Side -->
  <g transform="translate(650, 200)">
    <circle cx="0" cy="0" r="80" fill="url(#blueGrad)" />
    <text x="0" y="-100" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1e3a8a">Strong AI</text>
    <text x="0" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#64748b">General Intelligence</text>
    
    <!-- Brain/Network Icon -->
    <path d="M-40,-20 C-40,-50 40,-50 40,-20 C60,-20 60,20 40,20 C40,50 -40,50 -40,20 C-60,20 -60,-20 -40,-20" fill="none" stroke="white" stroke-width="3" opacity="0.8" />
    <circle cx="-20" cy="-10" r="4" fill="white" />
    <circle cx="20" cy="-10" r="4" fill="white" />
    <circle cx="0" cy="10" r="4" fill="white" />
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="white" stroke-width="1" opacity="0.6" />
    <line x1="-20" y1="-10" x2="0" y2="10" stroke="white" stroke-width="1" opacity="0.6" />
    <line x1="20" y1="-10" x2="0" y2="10" stroke="white" stroke-width="1" opacity="0.6" />
  </g>
  
  <!-- Arrow -->
  <path d="M300,200 L500,200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="400" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">The Gap</text>
</svg>
