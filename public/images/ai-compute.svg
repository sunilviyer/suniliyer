<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg)" />
  
  <!-- GPU Chip -->
  <g transform="translate(400, 200)">
    <!-- Outer Board -->
    <rect x="-120" y="-120" width="240" height="240" rx="10" fill="#334155" stroke="#475569" stroke-width="4" />
    
    <!-- Inner Core -->
    <rect x="-80" y="-80" width="160" height="160" rx="4" fill="url(#chip)" />
    
    <!-- Circuit Lines -->
    <path d="M-120,0 L-80,0" stroke="#64748b" stroke-width="4" />
    <path d="M120,0 L80,0" stroke="#64748b" stroke-width="4" />
    <path d="M0,-120 L0,-80" stroke="#64748b" stroke-width="4" />
    <path d="M0,120 L0,80" stroke="#64748b" stroke-width="4" />
    
    <!-- Core Details -->
    <rect x="-60" y="-60" width="120" height="120" rx="2" fill="#15803d" />
    <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#86efac">GPU</text>
  </g>
  
  <!-- Data Flow -->
  <circle cx="200" cy="200" r="10" fill="#3b82f6">
    <animate attributeName="cx" from="100" to="280" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="600" cy="200" r="10" fill="#3b82f6">
    <animate attributeName="cx" from="520" to="700" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Title -->
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#f8fafc">AI Compute</text>
</svg>
