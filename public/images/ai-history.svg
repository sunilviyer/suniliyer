<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad1)" />
  <text x="50%" y="40%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" fill="white" font-weight="bold">AI History</text>
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#bfdbfe">From Dartmouth to DeepMind</text>
  
  <!-- Simple timeline graphic -->
  <line x1="150" y1="300" x2="650" y2="300" stroke="white" stroke-width="4" opacity="0.5" />
  <circle cx="150" cy="300" r="8" fill="white" />
  <circle cx="316" cy="300" r="8" fill="white" />
  <circle cx="483" cy="300" r="8" fill="white" />
  <circle cx="650" cy="300" r="8" fill="white" />
  
  <text x="150" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">1956</text>
  <text x="316" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">1997</text>
  <text x="483" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">2012</text>
  <text x="650" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">Today</text>
</svg>
