<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg)" />
  
  <!-- Database Cylinders Stack -->
  <g transform="translate(300, 200)">
    <!-- Bottom Cylinder -->
    <ellipse cx="0" cy="60" rx="60" ry="20" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
    <path d="M-60,60 V100 A60,20 0 0 0 60,100 V60" fill="#94a3b8" stroke="#475569" stroke-width="2" />
    <ellipse cx="0" cy="100" rx="60" ry="20" fill="#94a3b8" stroke="#475569" stroke-width="2" />
    
    <!-- Middle Cylinder -->
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
    <path d="M-60,0 V40 A60,20 0 0 0 60,40 V0" fill="#94a3b8" stroke="#475569" stroke-width="2" />
    <ellipse cx="0" cy="40" rx="60" ry="20" fill="#94a3b8" stroke="#475569" stroke-width="2" />

    <!-- Top Cylinder -->
    <ellipse cx="0" cy="-60" rx="60" ry="20" fill="#e2e8f0" stroke="#475569" stroke-width="2" />
    <path d="M-60,-60 V-20 A60,20 0 0 0 60,-20 V-60" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
    <ellipse cx="0" cy="-20" rx="60" ry="20" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
  </g>
  
  <!-- Magnifying Glass / Analysis -->
  <g transform="translate(450, 150) rotate(-30)">
    <circle cx="0" cy="0" r="50" fill="rgba(255,255,255,0.3)" stroke="#2563eb" stroke-width="4" />
    <line x1="0" y1="50" x2="0" y2="100" stroke="#1e293b" stroke-width="8" stroke-linecap="round" />
    
    <!-- Binary inside glass -->
    <text x="-20" y="-10" font-family="monospace" font-size="12" fill="#2563eb">10110</text>
    <text x="-20" y="10" font-family="monospace" font-size="12" fill="#2563eb">01001</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="350" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1e293b">The Data Behind AI</text>
</svg>
