<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg)" />
  
  <!-- Foundation Block -->
  <g transform="translate(400, 300)">
    <rect x="-200" y="0" width="400" height="60" rx="4" fill="#1e293b" />
    <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f8fafc">FOUNDATION MODEL</text>
  </g>
  
  <!-- Applications Built on Top -->
  <g transform="translate(400, 200)">
    <!-- App 1 -->
    <rect x="-180" y="-80" width="100" height="140" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="2" />
    <text x="-130" y="-10" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white">Chat</text>
    
    <!-- App 2 -->
    <rect x="-50" y="-80" width="100" height="140" rx="8" fill="#10b981" stroke="#059669" stroke-width="2" />
    <text x="0" y="-10" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white">Code</text>
    
    <!-- App 3 -->
    <rect x="80" y="-80" width="100" height="140" rx="8" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2" />
    <text x="130" y="-10" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white">Search</text>
  </g>
  
  <!-- Connection Lines -->
  <path d="M250,300 L250,260" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M400,300 L400,260" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M550,300 L550,260" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Foundation Models</text>
</svg>
