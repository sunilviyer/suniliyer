<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg)" />
  
  <!-- Earth/Leaf Hybrid -->
  <g transform="translate(400, 200)">
    <circle cx="0" cy="0" r="100" fill="#3b82f6" opacity="0.2" />
    <path d="M0,0 Q50,-80 0,-120 Q-50,-80 0,0" fill="#16a34a" />
    <path d="M0,0 Q40,-60 0,-100" stroke="#86efac" stroke-width="2" fill="none" />
  </g>
  
  <!-- Server Rack -->
  <g transform="translate(250, 200)">
    <rect x="-40" y="-60" width="80" height="120" rx="4" fill="#475569" />
    <rect x="-30" y="-50" width="60" height="10" rx="2" fill="#94a3b8" />
    <rect x="-30" y="-30" width="60" height="10" rx="2" fill="#94a3b8" />
    <rect x="-30" y="-10" width="60" height="10" rx="2" fill="#94a3b8" />
    <rect x="-30" y="10" width="60" height="10" rx="2" fill="#94a3b8" />
    <rect x="-30" y="30" width="60" height="10" rx="2" fill="#94a3b8" />
    
    <!-- Heat Emission -->
    <path d="M0,-70 L0,-90" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" />
    <path d="M-20,-70 L-30,-90" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" />
    <path d="M20,-70 L30,-90" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" />
  </g>
  
  <!-- Energy Bolt -->
  <g transform="translate(550, 200)">
    <path d="M-10,-40 L20,-10 L-10,10 L10,40" stroke="#eab308" stroke-width="4" fill="none" />
  </g>
  
  <!-- Title -->
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Environmental Cost of AI</text>
</svg>
