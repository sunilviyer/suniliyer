<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg)" />
  
  <!-- Central Element: Magic/Creation -->
  <g transform="translate(400, 200)">
    <!-- Abstract "Generation" Cloud -->
    <path d="M-60,-40 C-80,-60 -120,-20 -100,0 C-120,20 -80,60 -60,40 C-40,70 40,70 60,40 C80,60 120,20 100,0 C120,-20 80,-60 60,-40 C40,-70 -40,-70 -60,-40" fill="white" stroke="#22c55e" stroke-width="3" opacity="0.9" />
    
    <!-- Sparkles -->
    <path d="M0,-50 L10,-80 L0,-110 L-10,-80 Z" fill="url(#sparkle)" />
    <path d="M60,-30 L80,-50 L60,-70 L40,-50 Z" fill="url(#sparkle)" transform="scale(0.7)" />
    <path d="M-60,30 L-80,50 L-60,70 L-40,50 Z" fill="url(#sparkle)" transform="scale(0.6)" />
    
    <!-- Input/Output Arrows -->
    <path d="M-200,0 L-120,0" stroke="#15803d" stroke-width="4" marker-end="url(#arrowhead)" />
    <text x="-160" y="-15" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#15803d">Prompt</text>
    
    <path d="M120,0 L200,0" stroke="#15803d" stroke-width="4" marker-end="url(#arrowhead)" />
    <text x="160" y="-15" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#15803d">Creation</text>
  </g>
  
  <!-- Icons representing output types -->
  <g transform="translate(650, 200)">
    <!-- Text -->
    <rect x="-30" y="-80" width="60" height="40" rx="5" fill="white" stroke="#15803d" stroke-width="2" />
    <line x1="-20" y1="-70" x2="20" y2="-70" stroke="#15803d" stroke-width="2" />
    <line x1="-20" y1="-60" x2="20" y2="-60" stroke="#15803d" stroke-width="2" />
    
    <!-- Image -->
    <rect x="-30" y="-20" width="60" height="40" rx="5" fill="white" stroke="#15803d" stroke-width="2" />
    <circle cx="0" cy="0" r="10" fill="#22c55e" opacity="0.5" />
    
    <!-- Code -->
    <rect x="-30" y="40" width="60" height="40" rx="5" fill="white" stroke="#15803d" stroke-width="2" />
    <text x="0" y="65" text-anchor="middle" font-family="monospace" font-size="16" fill="#15803d">&lt;/&gt;</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="350" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#14532d">Generative AI</text>
  <text x="400" y="375" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#166534">From Prompt to Creation</text>
</svg>
