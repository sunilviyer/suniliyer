<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg)" />
  
  <!-- Central Element: Abstract Brain/Network made of Text Lines -->
  <g transform="translate(400, 200)">
    <!-- Background glow -->
    <circle cx="0" cy="0" r="120" fill="#dbeafe" opacity="0.5" />
    
    <!-- Text lines forming a rough brain shape -->
    <path d="M-60,-40 Q-30,-80 0,-60 Q30,-80 60,-40" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round" />
    <path d="M-70,-10 H70" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" />
    <path d="M-60,20 H60" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" />
    <path d="M-40,50 H40" stroke="#bfdbfe" stroke-width="4" stroke-linecap="round" />
    
    <!-- Nodes connecting text -->
    <circle cx="-60" cy="-40" r="6" fill="#2563eb" />
    <circle cx="60" cy="-40" r="6" fill="#2563eb" />
    <circle cx="0" cy="-60" r="6" fill="#2563eb" />
    <circle cx="-70" cy="-10" r="6" fill="#2563eb" />
    <circle cx="70" cy="-10" r="6" fill="#2563eb" />
    
    <!-- Chat Bubble Icon emerging -->
    <g transform="translate(80, -80)">
        <path d="M0,0 L40,0 L40,30 L10,30 L0,40 L0,0" fill="#1e40af" />
        <text x="20" y="20" text-anchor="middle" fill="white" font-family="sans-serif" font-size="20">...</text>
    </g>
  </g>
  
  <!-- Binary/Text Stream Input -->
  <text x="100" y="200" font-family="monospace" font-size="14" fill="#94a3b8">
    INPUT
    TEXT
    DATA
  </text>
  <path d="M150,200 L250,200" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  
  <!-- Output Stream -->
  <text x="650" y="200" font-family="monospace" font-size="14" fill="#94a3b8">
    OUTPUT
    RESPONSE
    CONTENT
  </text>
  <path d="M550,200 L650,200" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />

  <!-- Title -->
  <text x="400" y="350" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Large Language Models</text>
</svg>
