<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Every Garden Has Secrets — suniliyer.ca</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-display: 'Playfair Display', serif;
  --font-body: 'Lora', serif;
}

html, body {
  height: 100%;
  background: #0d0d14;
  font-family: var(--font-body);
  overflow: hidden;
}

/* ── TOPNAV ── */
#topnav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: rgba(13,13,20,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  z-index: 100;
  transition: transform 0.3s ease;
}
#topnav.hidden { transform: translateY(-100%); }
.nav-logo {
  font-family: var(--font-display);
  font-size: 14px;
  color: #fff;
  letter-spacing: 0.5px;
}
#theme-toggle {
  width: 52px; height: 26px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 13px;
  cursor: pointer;
  position: relative;
  transition: background 0.3s;
  flex-shrink: 0;
}
#theme-toggle .knob {
  position: absolute;
  top: 2px; left: 2px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  transition: transform 0.3s;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  line-height: 1;
}
body.day #theme-toggle .knob { transform: translateX(26px); }
body.day #theme-toggle { background: rgba(255,200,50,0.2); }

/* ── COUNTER ── */
#counter {
  position: fixed;
  top: 56px; right: 12px;
  background: rgba(10,8,20,0.75);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 18px;
  padding: 5px 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  z-index: 99;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
  white-space: nowrap;
}
#counter.visible { opacity: 1; }
#counter.pulse { animation: cpulse 0.35s ease; }
@keyframes cpulse {
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.18)}
}
#counter.complete {
  background: rgba(180,120,10,0.3);
  border-color: rgba(245,158,11,0.5);
  color: #FCD34D;
}

/* ── STORYBOOK ── */
#book-overlay {
  position: fixed; inset: 0;
  z-index: 500;
  display: flex;
  perspective: 1400px;
}
.book-left, .book-right {
  flex: 1;
  position: relative;
  overflow: hidden;
  transition: transform 0.9s cubic-bezier(0.4,0,0.2,1);
}
.book-left {
  transform-origin: right center;
  background: linear-gradient(135deg, #2a1506 0%, #160b03 100%);
  border-right: 2px solid rgba(200,150,60,0.4);
}
.book-right {
  transform-origin: left center;
  background: linear-gradient(225deg, #2a1506 0%, #160b03 100%);
}
/* Leather texture */
.book-left::before, .book-right::before {
  content:'';
  position:absolute; inset:0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
  ),
  repeating-linear-gradient(
    90deg, transparent, transparent 3px,
    rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
  );
}
/* Gold spine decoration */
.book-left::after {
  content:'';
  position:absolute; top:0; right:0; bottom:0; width:6px;
  background: linear-gradient(to right, rgba(180,130,40,0.2), rgba(255,210,80,0.6), rgba(180,130,40,0.2));
}

.book-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 32px 20px;
}
.book-left .book-content {
  /* Left side: decorative border only */
  border: 1px solid rgba(180,130,40,0.15);
  margin: 16px;
  border-radius: 2px;
}
.book-egg {
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

.book-title {
  font-family: var(--font-display);
  font-size: clamp(18px, 4.5vw, 26px);
  color: #F5DEB3;
  line-height: 1.25;
  margin-bottom: 10px;
}
.book-sub {
  font-size: clamp(10px, 2.2vw, 12px);
  color: rgba(235,210,160,0.55);
  line-height: 1.65;
  max-width: 200px;
  margin-bottom: 18px;
}
.book-hint {
  font-size: 11px;
  font-style: italic;
  color: rgba(180,140,60,0.65);
  margin-bottom: 24px;
}
.open-btn {
  background: transparent;
  border: 1px solid rgba(200,160,60,0.45);
  color: #F5DEB3;
  padding: 9px 22px;
  border-radius: 20px;
  font-family: var(--font-body);
  font-size: 12px;
  cursor: pointer;
  animation: btnpulse 2.2s ease-in-out infinite;
  transition: all 0.2s;
}
.open-btn:hover { background: rgba(200,160,60,0.15); transform: scale(1.04); }
@keyframes btnpulse {
  0%,100%{box-shadow:0 0 0 0 rgba(200,160,60,0.25)}
  50%{box-shadow:0 0 0 10px rgba(200,160,60,0)}
}

/* Left side decorative motif */
.book-left-motif {
  font-family: var(--font-display);
  font-size: 80px;
  color: rgba(180,130,40,0.08);
  line-height: 1;
  user-select: none;
}

/* Open animation */
#book-overlay.opening .book-left { transform: rotateY(180deg); }
#book-overlay.opening .book-right { transform: rotateY(-180deg); }
#book-overlay.gone { display: none; }

/* ── GARDEN ── */
#garden-wrap {
  position: fixed;
  top: 48px; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
#garden-container {
  position: relative;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  line-height: 0;
}
#garden-day, #garden-night {
  width: 100%; height: auto;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
}
#garden-night {
  position: absolute;
  top: 0; left: 0;
  opacity: 0;
  transition: opacity 2.5s ease;
}
body.day #garden-day { opacity: 1; }
body.day #garden-night { opacity: 0; }
body:not(.day) #garden-day { opacity: 0; }
body:not(.day) #garden-night { opacity: 1; }

/* ── EGG ── */
.egg {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 20;
  /* KEY: very low opacity by default — hidden in plain sight */
  opacity: 0.18;
  transition: opacity 0.25s ease, transform 0.2s ease;
}
.egg:hover {
  opacity: 0.85;
}
.egg.found {
  opacity: 0.5;
  cursor: default;
  pointer-events: none;
}
.egg.found .egg-body {
  filter: grayscale(0.5) brightness(0.7);
}
/* Night-only eggs hidden in day mode */
.egg.night-only { display: none; }
body:not(.day) .egg.night-only { display: block; }

/* Crack animation */
@keyframes crack {
  0%   { transform: translate(-50%,-50%) scale(1) rotate(0deg); }
  20%  { transform: translate(-50%,-50%) scale(1.4) rotate(-6deg); }
  45%  { transform: translate(-50%,-50%) scale(0.85) rotate(4deg); }
  70%  { transform: translate(-50%,-50%) scale(1.1) rotate(-2deg); }
  100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); }
}
.egg.cracking { animation: crack 0.55s ease forwards; opacity: 0.95 !important; }

/* Completion egg */
.egg.completion {
  display: none;
  opacity: 1 !important;
}
.egg.completion.visible {
  display: block;
  animation: goldpulse 1.8s ease-in-out infinite;
}
@keyframes goldpulse {
  0%,100% { transform: translate(-50%,-50%) scale(1); filter: drop-shadow(0 0 6px rgba(245,158,11,0.9)); }
  50% { transform: translate(-50%,-62%) scale(1.06); filter: drop-shadow(0 0 14px rgba(245,158,11,1)); }
}

/* ── MODAL ── */
#modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(3px);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
#modal-bg.open { opacity: 1; pointer-events: all; }

#modal {
  width: 100%;
  max-width: 500px;
  background: rgba(10,8,22,0.97);
  border: 1px solid rgba(255,255,255,0.1);
  border-bottom: none;
  border-radius: 18px 18px 0 0;
  padding: 22px 22px 40px;
  transform: translateY(110%);
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  max-height: 78vh;
  overflow-y: auto;
}
#modal-bg.open #modal { transform: translateY(0); }

.m-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.m-badge {
  display: flex; align-items: center; gap: 7px;
}
.m-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.t1 { background: #7C3AED; }
.t2 { background: #D97706; }
.t3 { background: #1D4ED8; }
.ts { background: #F59E0B; }
.m-tier {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: rgba(255,255,255,0.4);
}
.m-close {
  background: rgba(255,255,255,0.07);
  border: none;
  color: rgba(255,255,255,0.5);
  width: 30px; height: 30px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}
.m-close:hover { background: rgba(255,255,255,0.14); }

.m-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: #fff;
  line-height: 1.3;
  margin-bottom: 5px;
}
.m-loc {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 14px;
}
.m-body {
  font-size: 13.5px;
  line-height: 1.78;
  color: rgba(255,255,255,0.7);
  margin-bottom: 18px;
}
.m-link {
  display: inline-block;
  font-size: 12px;
  color: #A78BFA;
  border-bottom: 1px solid rgba(167,139,250,0.25);
  padding-bottom: 1px;
  margin-bottom: 18px;
  cursor: pointer;
  transition: color 0.2s;
  text-decoration: none;
}
.m-link:hover { color: #C4B5FD; }
.m-hint {
  border-top: 1px solid rgba(255,255,255,0.07);
  padding-top: 14px;
  font-size: 11.5px;
  font-style: italic;
  color: rgba(255,255,255,0.28);
  line-height: 1.6;
}
.m-hint em { color: rgba(200,160,70,0.65); font-style: normal; }

/* ── COMPLETION ── */
#completion {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 400;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.2s ease;
  text-align: center;
  padding: 32px;
  background: rgba(0,0,0,0.25);
}
#completion.show { opacity: 1; }
.comp-msg {
  max-width: 320px;
}
.comp-line1 {
  font-family: var(--font-display);
  font-size: clamp(18px, 4.5vw, 26px);
  color: #F5DEB3;
  line-height: 1.45;
  margin-bottom: 10px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
.comp-line2 {
  font-size: 12px;
  color: rgba(245,222,179,0.45);
  font-style: italic;
  text-shadow: 0 1px 8px rgba(0,0,0,0.8);
}
</style>
</head>

// COMPLETION EGG
const COMP = {
  id:99, x:50, y:51, tier:'s',
  title:'You Found Them All',
  location:'The centre of the garden',
  body:'Every egg. Every secret. Every hidden craft decision. You found the watering can, the lanterns, the nests, the beehive, the greenhouse pot, the shed door, the stone wall, the carved tree trunk, even the sky itself. This is the last one.',
  link:'→ The garden thanks you', hint:''
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let found = new Set();
let isDay = false;
const TOTAL = 29;

// ─── SVG PATTERNS ─────────────────────────────────────────────────────────────
function makeEgg(egg) {
  const s = egg.size;
  const sw = s * 2; const sh = s * 2.5;
  const cx = sw/2, cy = sh/2 + sh*0.05;
  const rx = sw/2 - 1, ry = sh/2;
  const c = egg.col;

  let pattern = '';
  switch(egg.pat) {
    case 'stripes':
      pattern = `<line x1="${cx-rx*0.7}" y1="${cy-ry*0.3}" x2="${cx+rx*0.7}" y2="${cy-ry*0.3}" stroke="${c}" stroke-width="1.2" opacity="0.8"/>
                 <line x1="${cx-rx*0.85}" y1="${cy+ry*0.1}" x2="${cx+rx*0.85}" y2="${cy+ry*0.1}" stroke="${c}" stroke-width="1.2" opacity="0.8"/>
                 <line x1="${cx-rx*0.7}" y1="${cy+ry*0.5}" x2="${cx+rx*0.7}" y2="${cy+ry*0.5}" stroke="${c}" stroke-width="1.2" opacity="0.8"/>`;
      break;
    case 'dots':
      pattern = `<circle cx="${cx-rx*0.35}" cy="${cy-ry*0.3}" r="${s*0.15}" fill="${c}" opacity="0.9"/>
                 <circle cx="${cx+rx*0.35}" cy="${cy+ry*0.05}" r="${s*0.12}" fill="${c}" opacity="0.9"/>
                 <circle cx="${cx}" cy="${cy+ry*0.45}" r="${s*0.14}" fill="${c}" opacity="0.9"/>`;
      break;
    case 'zigzag':
      const pts = `${cx-rx*0.6},${cy-ry*0.15} ${cx-rx*0.2},${cy-ry*0.45} ${cx+rx*0.2},${cy-ry*0.15} ${cx+rx*0.6},${cy-ry*0.45}`;
      pattern = `<polyline points="${pts}" stroke="${c}" stroke-width="1.3" fill="none" opacity="0.85"/>
                 <polyline points="${cx-rx*0.6},${cy+ry*0.25} ${cx-rx*0.2},${cy-ry*0.05} ${cx+rx*0.2},${cy+ry*0.25} ${cx+rx*0.6},${cy-ry*0.05}" stroke="${c}" stroke-width="1.3" fill="none" opacity="0.85"/>`;
      break;
    case 'diamonds':
      pattern = `<path d="M${cx},${cy-ry*0.45} L${cx+rx*0.3},${cy} L${cx},${cy+ry*0.45} L${cx-rx*0.3},${cy} Z" stroke="${c}" stroke-width="1.2" fill="${c}" fill-opacity="0.25" opacity="0.85"/>`;
      break;
    case 'waves':
      pattern = `<path d="M${cx-rx*0.7},${cy-ry*0.2} Q${cx-rx*0.35},${cy-ry*0.5} ${cx},${cy-ry*0.2} Q${cx+rx*0.35},${cy+ry*0.1} ${cx+rx*0.7},${cy-ry*0.2}" stroke="${c}" stroke-width="1.3" fill="none" opacity="0.85"/>
                 <path d="M${cx-rx*0.7},${cy+ry*0.3} Q${cx-rx*0.35},${cy} ${cx},${cy+ry*0.3} Q${cx+rx*0.35},${cy+ry*0.6} ${cx+rx*0.7},${cy+ry*0.3}" stroke="${c}" stroke-width="1.3" fill="none" opacity="0.85"/>`;
      break;
    case 'stars':
      pattern = `<path d="M${cx},${cy-ry*0.5} L${cx+rx*0.15},${cy-ry*0.15} L${cx+rx*0.5},${cy-ry*0.15} L${cx+rx*0.2},${cy+ry*0.08} L${cx+rx*0.3},${cy+ry*0.45} L${cx},${cy+ry*0.2} L${cx-rx*0.3},${cy+ry*0.45} L${cx-rx*0.2},${cy+ry*0.08} L${cx-rx*0.5},${cy-ry*0.15} L${cx-rx*0.15},${cy-ry*0.15} Z" fill="${c}" fill-opacity="0.7" stroke="${c}" stroke-width="0.8" opacity="0.9"/>`;
      break;
    default: break;
  }

  return `<svg class="egg-body" width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="white" stroke="rgba(180,180,180,0.3)" stroke-width="0.8"/>
    ${pattern}
  </svg>`;
}

function makeGoldEgg() {
  return `<svg class="egg-body" width="36" height="44" viewBox="0 0 36 44" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="18" cy="24" rx="16" ry="20" fill="url(#gg)"/>
    <ellipse cx="18" cy="24" rx="11" ry="14" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <path d="M10 18 Q18 14 26 18" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" fill="none"/>
    <defs><linearGradient id="gg" x1="2" y1="4" x2="34" y2="44">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient></defs>
  </svg>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const gc = document.getElementById('garden-container');
  gc.querySelectorAll('.egg').forEach(e => e.remove());

  EGGS.forEach(egg => {
    const el = document.createElement('div');
    el.className = 'egg' + (egg.nightOnly ? ' night-only' : '');
    el.dataset.id = egg.id;
    el.style.left = egg.x + '%';
    el.style.top = egg.y + '%';
    el.innerHTML = makeEgg(egg);
    if (found.has(egg.id)) el.classList.add('found');
    el.addEventListener('click', () => click(egg, el));
    gc.appendChild(el);
  });

  // Completion egg
  const cel = document.createElement('div');
  cel.className = 'egg completion';
  cel.dataset.id = 99;
  cel.style.left = COMP.x + '%';
  cel.style.top = COMP.y + '%';
  cel.innerHTML = makeGoldEgg();
  cel.addEventListener('click', () => triggerCompletion());
  document.getElementById('garden-container').appendChild(cel);
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function click(egg, el) {
  if (found.has(egg.id) || el.classList.contains('found')) return;
  el.classList.add('cracking');
  setTimeout(() => {
    el.classList.remove('cracking');
    el.classList.add('found');
    found.add(egg.id);
    bumpCounter();
    showModal(egg);
    // Check if all 29 found (excluding comp)
    const huntFound = [...found].filter(id => id !== 99).length;
    if (huntFound >= TOTAL) {
      setTimeout(() => {
        document.getElementById('modal-bg').classList.remove('open');
        document.querySelector('.egg.completion').classList.add('visible');
      }, 700);
    }
  }, 560);
}

function bumpCounter() {
  const n = [...found].filter(id => id !== 99).length;
  document.getElementById('cnt').textContent = n;
  const c = document.getElementById('counter');
  c.classList.remove('pulse');
  void c.offsetWidth;
  c.classList.add('pulse');
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
const TIER_INFO = {
  1: { cls:'t1', label:'Major Discovery' },
  2: { cls:'t2', label:'Subtle Craftsmanship' },
  3: { cls:'t3', label:'Under the Hood' },
  s: { cls:'ts', label:'Special' },
};

function showModal(egg) {
  const ti = TIER_INFO[egg.tier] || TIER_INFO[1];
  document.getElementById('m-dot').className = 'm-dot ' + ti.cls;
  document.getElementById('m-tier').textContent = ti.label;
  document.getElementById('m-title').textContent = egg.title;
  document.getElementById('m-loc').textContent = '📍 ' + egg.location;
  document.getElementById('m-body').textContent = egg.body;
  const ml = document.getElementById('m-link');
  ml.textContent = egg.link;
  const mh = document.getElementById('m-hint');
  if (egg.hint) {
    mh.innerHTML = `Psst... <em>${egg.hint}</em>`;
    mh.style.display = '';
  } else {
    mh.style.display = 'none';
  }
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});
document.getElementById('m-close').addEventListener('click', closeModal);

// ─── COMPLETION ───────────────────────────────────────────────────────────────
function triggerCompletion() {
  found.add(99);
  const c = document.getElementById('counter');
  c.innerHTML = '🥚 29 / 29';
  c.classList.add('complete');
  // Garden transform — switch to opposite mode, slowly
  doThemeSwitch(!isDay, 4000);
  setTimeout(() => {
    const cm = document.getElementById('completion');
    cm.classList.add('show');
    setTimeout(() => cm.classList.remove('show'), 7000);
  }, 2200);
}

// ─── THEME ────────────────────────────────────────────────────────────────────
function doThemeSwitch(toDay, dur = 2500) {
  if (toDay) {
    document.body.classList.add('day');
    document.querySelector('#theme-toggle .knob').textContent = '☀️';
  } else {
    document.body.classList.remove('day');
    document.querySelector('#theme-toggle .knob').textContent = '🌙';
  }
  // update transition duration dynamically
  const dn = document.getElementById('garden-night');
  const dd = document.getElementById('garden-day');
  dn.style.transition = `opacity ${dur}ms ease`;
  dd.style.transition = `opacity ${dur}ms ease`;
  setTimeout(() => {
    dn.style.transition = 'opacity 2.5s ease';
    dd.style.transition = '';
  }, dur + 100);
  isDay = toDay;
}

document.getElementById('theme-toggle').addEventListener('click', () => doThemeSwitch(!isDay));

// ─── TOPNAV AUTO-HIDE ─────────────────────────────────────────────────────────
let lastY = 0;
document.getElementById('garden-wrap').addEventListener('scroll', e => {
  const y = e.target.scrollTop;
  const nav = document.getElementById('topnav');
  nav.classList.toggle('hidden', y > lastY && y > 60);
  lastY = y;
});

// ─── BOOK OPEN ────────────────────────────────────────────────────────────────
document.getElementById('open-btn').addEventListener('click', () => {
  const bo = document.getElementById('book-overlay');
  bo.classList.add('opening');
  setTimeout(() => {
    bo.classList.add('gone');
    document.getElementById('counter').classList.add('visible');
  }, 950);
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
